<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #e0e0e0; padding: 50px; }
  .card {
    position: relative;
    width: 300px;
    height: 300px;
    background: #f4f4f5;
    border-radius: 24px;
    overflow: hidden;
  }
  .cutout {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 80px;
    height: 80px;
    background: white;
    border-top-left-radius: 24px;
  }
  .curve-top {
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 24px;
    height: 24px;
    background: transparent;
    border-bottom-right-radius: 24px;
    box-shadow: 12px 12px 0 0 white;
  }
  .curve-left {
    position: absolute;
    bottom: 0;
    right: 80px;
    width: 24px;
    height: 24px;
    background: transparent;
    border-bottom-right-radius: 24px;
    box-shadow: 12px 12px 0 0 white;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="cutout"></div>
    <div class="curve-top"></div>
    <div class="curve-left"></div>
  </div>
</body>
</html>
